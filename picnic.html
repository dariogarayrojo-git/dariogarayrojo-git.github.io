  <script>
    let currentImageId = null;
    let un_boton;

    document.addEventListener("DOMContentLoaded", function() {
        un_boton = document.getElementById("un_boton");
        like_boton = document.getElementById("like_boton");

        un_boton.addEventListener("click", irPorAlgo);
        like_boton.addEventListener("click", votar);

    // Función mostrar imágen perro
    async function irPorAlgo() {
      try {
            const respuesta = await fetch("https://api.thedogapi.com/v1/images/search?limit=1",      {
            method: "GET", 
            headers: {
                "x-api-key": "live_eRwy5I5bZ36SHwpeaOeWsRdLVBxllVPZIAp3zIWQvrdYpIEMWG9cInb5PWy5GrN6"
            }
    });
        if (!respuesta.ok) {
          console.log("Error");
          //throw new Error("Error");
        }
        const data = await respuesta.json();
        console.log(data);

        const url = data[0].url;
        currentImageId = data[0].id;
        console.log(currentImageId);
        const img = document.getElementById("img_perro");
        img.src = url;

      } catch (error) {
        console.error("Error:", error.message);
      }


    }

    // Función votar por una imágen
    async function votar() {
      try {
          const respuesta = await fetch("https://api.thedogapi.com/v1/votes", {
          method: 'POST', 
          headers: {
              'Content-Type': 'application/json',
              'x-api-key': 'live_eRwy5I5bZ36SHwpeaOeWsRdLVBxllVPZIAp3zIWQvrdYpIEMWG9cInb5PWy5GrN6' 
              },
              body: JSON.stringify({
              image_id: currentImageId,
              value: 1
            })
    });
        if (!respuesta.ok) {
          console.log("Error");
          //throw new Error("Error de algo");
        }
        const data = await respuesta.json();
        console.log(data);

      } catch (error) {
        console.error("Error:", error.message);
      }
    }
